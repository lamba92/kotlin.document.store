name: Publish release

on:
  release:
    types: [ published ]

jobs:
  publish:
    runs-on: macos-latest
    name: "Publish to Central Portal"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: adopt
          java-version: 21
      - uses: gradle/actions/setup-gradle@v4
      - run: chmod +x gradlew
      # macOS is the one host that can build every KMP target (Apple natively, the rest via
      # cross-compilation), so a single runner produces one complete Central Portal deployment.
      - run: ./gradlew publishAggregationToCentralPortal --stacktrace
        env:
          PUBLISH_ALL_PLATFORMS: "true"
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SIGNING_PRIVATE_KEY: ${{ secrets.SIGNING_PRIVATE_KEY }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
